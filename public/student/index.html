<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0f1a" />
<link rel="manifest" href="/shared/manifest.json" />
<title>UniversalQuiz — Join</title>
<link rel="stylesheet" href="/shared/theme.css" />
<link rel="stylesheet" href="student.css" />
</head>
<body>
  <div id="splash-screen" class="splash-screen">
    <div class="brand-logo-frame">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z" />
        <path d="M20 2v4" /><path d="M22 4h-4" /><circle cx="4" cy="20" r="2" />
      </svg>
    </div>
    <div class="pulse-dot"></div>
  </div>

  <div class="brand-chip">
    <picture>
      <img class="brand-chip-logo" id="brand-chip-logo" src="" alt="Event logo" />
    </picture>
    <span class="brand-chip-text"><strong id="brand-chip-title">UniversalQuiz</strong><span class="brand-chip-sub" id="brand-chip-subtitle">Live Quiz</span></span>
  </div>

  <div class="app-shell">
    <section id="view-participant-welcome" class="view view-active">
      <div class="participant-welcome">
        <div class="brand-logo-frame">
          <img class="brand-logo" id="pw-logo" src="" alt="Event logo" />
        </div>
        <p class="kicker" id="pw-organizer"></p>

        <h1 class="pw-title" id="pw-title"></h1>
        <p class="pw-programme" id="pw-subtitle"></p>

        <p class="pw-welcome-msg">Welcome! Tap below to join the live quiz.</p>

        <button id="pw-continue-btn" class="btn-primary btn-large">Get Started</button>
      </div>
    </section>

    <section id="view-join" class="view">
      <header class="join-header">
        <h1>Join the Quiz</h1>
      </header>

      <div class="field-row">
        <label for="room-code-input">Room Code</label>
        <input id="room-code-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="6-digit code" />
      </div>

      <div class="field-row">
        <label for="student-name-input">Your Name</label>
        <input id="student-name-input" type="text" maxlength="40" placeholder="Enter your name" autocomplete="off" />
      </div>

      <div class="field-row" id="team-select-row" hidden>
        <label for="team-select">Choose your team</label>
        <select id="team-select">
          <option value="" disabled selected>Select a team…</option>
        </select>
      </div>

      <p id="join-error" class="error-text"></p>
      <button id="join-btn" class="btn-primary btn-large">Join Quiz</button>
    </section>

    <section id="view-waiting" class="view">
      <div class="glass-card waiting-card">
        <div class="pulse-dot"></div>
        <h2>You're in, <span id="waiting-name"></span>!</h2>
        <p>Waiting for the quiz to start…</p>
        <p class="waiting-group" id="waiting-group"></p>
      </div>
    </section>

    <section id="view-session-state" class="view">
      <div class="glass-card waiting-card">
        <h2 id="session-state-heading">Please wait</h2>
        <p id="session-state-body"></p>
        <button id="session-state-refresh-btn" class="btn-text">Refresh</button>
      </div>
    </section>

    <section id="view-intro" class="view">
      <div class="intro-screen">
        <p class="intro-question-number" id="intro-question-number"></p>
        <p class="intro-category" id="intro-category"></p>
        <div class="intro-countdown" id="intro-countdown">3</div>
        <p class="intro-hint">Get ready!</p>
      </div>
    </section>

    <section id="view-question" class="view">
      <div class="question-topbar">
        <span class="question-progress" id="question-progress"></span>
        <div class="timer-ring timer-ring-sm" id="timer-ring">
          <svg viewBox="0 0 100 100">
            <circle class="timer-track" cx="50" cy="50" r="45"></circle>
            <circle class="timer-fill" id="timer-fill-circle" cx="50" cy="50" r="45"></circle>
          </svg>
          <span class="timer-value" id="timer-value"></span>
        </div>
      </div>

      <div class="question-body glass-card">
        <h2 id="question-text"></h2>
        <img id="question-image" class="question-image" alt="" hidden />
      </div>

      <div class="answer-grid" id="answer-grid"></div>

      <div class="submitted-overlay" id="submitted-overlay">
        <p id="submitted-message">✅ Answer Submitted</p>
        <div class="submitted-stats" id="submitted-stats">
          <div><span id="submitted-score">0</span><label>Score</label></div>
          <div><span id="submitted-rank">–</span><label>Rank</label></div>
          <div><span id="submitted-group-name">–</span><label>Group</label></div>
        </div>
        <p class="submitted-sub" id="submitted-sub">Waiting for reveal…</p>
      </div>
    </section>

    <section id="view-result" class="view">
      <div class="glass-card result-card">
        <p class="result-badge" id="result-badge"></p>
        <p class="result-points" id="result-points"></p>

        <div class="knowledge-card visible" id="knowledge-card">
          <p class="km-label">Learning Moment</p>
          <p class="km-text" id="result-explanation"></p>
        </div>

        <div class="result-meta">
          <div><span id="result-score">0</span><label>Total Score</label></div>
          <div><span id="result-streak">0</span><label>Streak</label></div>
        </div>

        <div class="achievement-row" id="achievement-row"></div>
      </div>
    </section>

    <section id="view-final" class="view">
      <div class="glass-card final-panel">
        <div class="brand-logo-frame brand-logo-frame-sm">
          <img class="brand-logo" id="final-logo" src="" alt="Event logo" />
        </div>
        <h1 id="final-heading">🏁 Quiz Complete!</h1>

        <div class="final-personal-stats">
          <div><span id="final-my-rank">–</span><label>Your Rank</label></div>
          <div><span id="final-my-score">0</span><label>Your Score</label></div>
          <div><span id="final-my-group-rank">–</span><label>Group Rank</label></div>
        </div>

        <div class="achievement-row" id="final-achievement-row"></div>

        <p class="final-champion-note" id="final-champion-note"></p>

        <p class="final-note" id="final-thanks"></p>
      </div>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/shared/countdown.js"></script>
  <script src="/shared/confetti.js"></script>
  <script src="/shared/splash.js"></script>
  <script src="/shared/icons.js"></script>
  <script src="/shared/emblems.js"></script>
  <script src="/shared/branding.js"></script>
  <script src="student.js"></script>
</body>
</html>
